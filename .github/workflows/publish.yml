name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to publish from'
        required: false
        default: 'main'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Debug signing secrets
        env:
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          echo "=== Secret presence ==="
          [ -n "$SIGNING_KEY_ID" ]         && echo "SIGNING_KEY_ID:         set" || echo "SIGNING_KEY_ID:         MISSING OR EMPTY"
          [ -n "$SIGNING_KEY" ]            && echo "SIGNING_KEY:            set" || echo "SIGNING_KEY:            MISSING OR EMPTY"
          [ -n "$SIGNING_KEY_PASSWORD" ]   && echo "SIGNING_KEY_PASSWORD:   set" || echo "SIGNING_KEY_PASSWORD:   MISSING OR EMPTY"
          [ -n "$MAVEN_CENTRAL_USERNAME" ] && echo "MAVEN_CENTRAL_USERNAME: set" || echo "MAVEN_CENTRAL_USERNAME: MISSING OR EMPTY"
          [ -n "$MAVEN_CENTRAL_PASSWORD" ] && echo "MAVEN_CENTRAL_PASSWORD: set" || echo "MAVEN_CENTRAL_PASSWORD: MISSING OR EMPTY"

          echo ""
          echo "=== SIGNING_KEY_ID format ==="
          if [ -n "$SIGNING_KEY_ID" ]; then
            [[ "$SIGNING_KEY_ID" =~ ^[0-9A-Fa-f]{8}$ ]] \
              && echo "format: OK (8 hex chars)" \
              || echo "format: UNEXPECTED — expected exactly 8 hex characters (e.g. AB12CD34)"
          fi

          echo ""
          echo "=== SIGNING_KEY format ==="
          if [ -n "$SIGNING_KEY" ]; then
            [[ "$SIGNING_KEY" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]] \
              && echo "header: OK" \
              || echo "header: MISSING — key does not contain 'BEGIN PGP PRIVATE KEY BLOCK'"
            [[ "$SIGNING_KEY" == *"END PGP PRIVATE KEY BLOCK"* ]] \
              && echo "footer: OK" \
              || echo "footer: MISSING — key does not contain 'END PGP PRIVATE KEY BLOCK'"
          fi

      - name: Publish and release to Maven Central
        run: ./gradlew :lib:publishAndReleaseToMavenCentral --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
